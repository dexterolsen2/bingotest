<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Interactive Bingo Simulator</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --border-radius: 12px;
            --text-dark: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        input[type="number"], select, input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        /* Layout for Bingo Cards */
        #board-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            padding: 10px 0;
        }
        .bingo-card-wrapper {
            background: var(--card-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-bottom: 2px dashed #ccc;
            background: transparent;
            width: 150px;
        }
        .card-title:focus { outline: none; border-bottom-color: var(--primary); }
        .card-settings {
            display: flex;
            gap: 10px;
        }
        .card-settings select { flex: 1; }
        .header-buttons { display: flex; gap: 5px; }
        .header-buttons button { padding: 6px 12px; font-size: 14px; }
        
        /* Bingo Grid */
        .bingo-grid {
            display: grid;
            gap: 5px;
            margin-top: 10px;
        }
        .grid-5x5 { grid-template-columns: repeat(5, 1fr); }
        .grid-4x4 { grid-template-columns: repeat(4, 1fr); }
        
        .bingo-cell {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            background: #fff;
            padding: 2px;
            position: relative;
        }
        .bingo-cell img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            margin-bottom: 4px;
            pointer-events: none;
        }
        .bingo-cell span {
            line-height: 1.1;
            pointer-events: none;
        }
        .bingo-cell:hover { border-color: var(--primary); }
        .bingo-cell.checked {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .bingo-cell.checked::after {
            content: '✔';
            position: absolute;
            font-size: 40px;
            color: rgba(40, 167, 69, 0.4);
            z-index: 1;
        }
        .bingo-cell.free-space {
            background-color: #fff3cd;
            border-color: #ffc107;
            font-weight: bold;
        }
        .bingo-cell.free-space.checked {
            background-color: #ffe8a1;
        }
    </style>
</head>
<body>

<header>
    <h1>Multi-Interactive Bingo</h1>
    <div class="controls">
        <label>
            Cards to Generate:
            <input type="number" id="num-cards" value="2" min="1" max="20" style="width: 60px;">
        </label>
        <button onclick="generateLayout()">Create Layout</button>
        <button onclick="saveToLocal()">Save Progress</button>
        <button onclick="loadFromLocal()">Load Progress</button>
        <button onclick="exportJSON()">Export JSON</button>
        <div class="file-input-wrapper">
            <button>Import JSON</button>
            <input type="file" id="import-file" accept=".json" onchange="importJSON(event)">
        </div>
    </div>
</header>

    // --- 2. STATE MANAGEMENT ---
    let appState = [];

    // --- 3. UTILITY: Generate reliable SVG data URI for images ---
    function generateSVGPlaceholder(text) {
        // Grab just the first word/few characters to fit nicely in the placeholder box
        const shortText = text.split(' ')[0].substring(0, 10); 
        const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
                <rect width="80" height="80" fill="#eeeeee"/>
                <text x="40" y="45" font-family="sans-serif" font-weight="bold" font-size="12" fill="#555555" text-anchor="middle">${shortText}</text>
            </svg>
        `;
        // Encode to base64 to ensure it loads flawlessly across all devices and browsers without external APIs
        return `data:image/svg+xml;base64,${btoa(svg)}`;
    }

    // --- 4. CORE FUNCTIONS ---
    
    // Generate the initial grid of empty cards
    function generateLayout() {
        const numCards = parseInt(document.getElementById('num-cards').value);
        if (numCards < 1 || numCards > 50) return alert("Please choose between 1 and 50 cards.");
        
        appState = [];
        for (let i = 0; i < numCards; i++) {
            appState.push({
                id: generateId(),
                title: `Player ${i + 1}`,
                category: "roadTrip",
                subcategory: "auto",
                grid: [],
                progressCount: 0
            });
        }
        
        appState.forEach(card => populateCardGrid(card));
        renderApp();
    }

    // Populate a specific card's grid based on its cat/subcat
    function populateCardGrid(card) {
        const subData = BINGO_DATA[card.category].subcategories[card.subcategory];
        const size = subData.size;
        const totalSlots = size * size;
        
        let shuffledItems = [...subData.items].sort(() => 0.5 - Math.random());
        
        let grid = [];
        let itemIndex = 0;
        
        for (let i = 0; i < totalSlots; i++) {
            const isFreeSpace = (size % 2 !== 0) && (i === Math.floor(totalSlots / 2));
            
            if (isFreeSpace) {
                grid.push({ text: "FREE", img: "", checked: true, isFreeSpace: true });
            } else {
                let itemName = shuffledItems[itemIndex] || `Item ${itemIndex}`;
                // Now using the completely reliable built-in SVG generator
                let imgUrl = generateSVGPlaceholder(itemName);
                
                grid.push({
                    text: itemName,
                    img: imgUrl,
                    checked: false,
                    isFreeSpace: false
                });
                itemIndex++;
            }
        }
        card.grid = grid;
        card.progressCount = 0;
    }

    // Toggle cell check state
    function toggleCell(cardId, cellIndex) {
        const card = appState.find(c => c.id === cardId);
        if (!card) return;
        
        const cell = card.grid[cellIndex];
        if (cell.isFreeSpace) return; 
        
        cell.checked = !cell.checked;
        
        // Update progress
        card.progressCount = card.grid.filter(c => c.checked && !c.isFreeSpace).length;
        renderApp(); 
    }

    // Individual Regenerate
    function regenerateCard(cardId) {
        const card = appState.find(c => c.id === cardId);
        if (card.progressCount > 0) return alert("Please clear progress first using the 'Clear' button.");
        populateCardGrid(card);
        renderApp();
    }

    // Clear Progress from an individual card
    function clearCard(cardId) {
        const card = appState.find(c => c.id === cardId);
        if (!card) return;
        
        card.grid.forEach(cell => {
            if (!cell.isFreeSpace) cell.checked = false;
        });
        card.progressCount = 0;
        renderApp();
    }

    // Update Category/Subcategory Dropdowns
    function updateCardCategory(cardId, newCategory) {
        const card = appState.find(c => c.id === cardId);
        card.category = newCategory;
        card.subcategory = Object.keys(BINGO_DATA[newCategory].subcategories)[0];
        
        if (card.progressCount === 0) populateCardGrid(card);
        renderApp();
    }

    function updateCardSubcategory(cardId, newSubcategory) {
        const card = appState.find(c => c.id === cardId);
        card.subcategory = newSubcategory;
        
        if (card.progressCount === 0) populateCardGrid(card);
        renderApp();
    }
    
    function updateCardTitle(cardId, newTitle) {
        const card = appState.find(c => c.id === cardId);
        if (card) card.title = newTitle;
    }

    // --- 5. RENDER LOGIC ---
    function renderApp() {
        const container = document.getElementById('board-container');
        container.innerHTML = '';
        
        appState.forEach((card) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'bingo-card-wrapper';
            
            let catOptions = '';
            for (const [catKey, catVal] of Object.entries(BINGO_DATA)) {
                catOptions += `<option value="${catKey}" ${card.category === catKey ? 'selected' : ''}>${catVal.name}</option>`;
            }
            
            let subOptions = '';
            const activeSubcategories = BINGO_DATA[card.category].subcategories;
            for (const [subKey, subVal] of Object.entries(activeSubcategories)) {
                subOptions += `<option value="${subKey}" ${card.subcategory === subKey ? 'selected' : ''}>${subVal.name}</option>`;
            }

            const size = activeSubcategories[card.subcategory].size;
            const gridClass = size === 4 ? 'grid-4x4' : 'grid-5x5';
            
            wrapper.innerHTML = `
                <div class="card-header">
                    <input type="text" class="card-title" value="${card.title}" onchange="updateCardTitle('${card.id}', this.value)">
                    <div class="header-buttons">
                        <button onclick="clearCard('${card.id}')" title="Clear all marks">🧹 Clear</button>
                        <button onclick="regenerateCard('${card.id}')" ${card.progressCount > 0 ? 'disabled' : ''} title="Can only regenerate if no progress">🔄 Regen</button>
                    </div>
                </div>
                <div class="card-settings">
                    <select onchange="updateCardCategory('${card.id}', this.value)">${catOptions}</select>
                    <select onchange="updateCardSubcategory('${card.id}', this.value)">${subOptions}</select>
                </div>
                <div class="bingo-grid ${gridClass}">
                    ${card.grid.map((cell, index) => `
                        <div class="bingo-cell ${cell.isFreeSpace ? 'free-space' : ''} ${cell.checked ? 'checked' : ''}" 
                             onclick="toggleCell('${card.id}', ${index})">
                            ${cell.img && !cell.isFreeSpace ? `<img src="${cell.img}" alt="${cell.text}">` : ''}
                            <span>${cell.text}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(wrapper);
        });
    }

    // --- 6. UTILITIES & STORAGE ---
    function generateId() {
        return Math.random().toString(36).substr(2, 9);
    }

    function saveToLocal() {
        localStorage.setItem('bingoDataSave', JSON.stringify(appState));
        alert('Progress saved to local device!');
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('bingoDataSave');
        if (saved) {
            appState = JSON.parse(saved);
            renderApp();
            alert('Progress loaded!');
        } else {
            alert('No saved data found.');
        }
    }

    function exportJSON() {
        if (appState.length === 0) return alert("Nothing to export!");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "bingo_save.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    appState = imported;
                    renderApp();
                    alert("JSON imported successfully!");
                }
            } catch (err) {
                alert("Invalid JSON file.");
            }
        };
        reader.readAsText(file);
    }

    // Initialize with a blank state
    window.onload = () => {
        if(!localStorage.getItem('bingoDataSave')) {
            generateLayout(); 
        } else {
            loadFromLocal();
        }
    };
</script>

</body>
</html>
